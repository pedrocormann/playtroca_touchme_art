<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TouchMe · Pedras Osvaldinho</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div>
      <h1>TouchMe · Pedras</h1>
      <p class="subtitle">Mapeamento de sensores → sons. Obra de Osvaldinho.</p>
    </div>
    <div class="status">
      <div><span class="dot" id="midi-dot"></span> <span id="midi-name">—</span></div>
      <div><strong id="sample-count">0</strong> samples</div>
    </div>
  </header>

  <section class="globals">
    <div class="control">
      <label for="master-volume">Volume mestre</label>
      <input type="range" id="master-volume" min="0" max="1" step="0.01" value="1">
      <output id="master-volume-out">100%</output>
    </div>
    <div class="control">
      <label for="cooldown" title="Tempo mínimo até o mesmo áudio poder disparar de novo">
        Lockout entre toques (mesmo som)
      </label>
      <input type="range" id="cooldown" min="0" max="10" step="0.1" value="2">
      <output id="cooldown-out">2.0 s</output>
    </div>
    <div class="control">
      <div class="control-row">
        <label for="fade-ms" title="Quando o visitante solta o pad, fade-out em N ms">
          Fade-out ao soltar
        </label>
        <input type="range" id="fade-ms" min="100" max="10000" step="100" value="5000">
        <output id="fade-ms-out">5.0 s</output>
      </div>
    </div>
    <div class="control">
      <label for="max-play" title="Tempo máximo que um áudio toca mesmo se o visitante segurar">
        Duração máxima por toque
      </label>
      <input type="range" id="max-play" min="1" max="60" step="1" value="20">
      <output id="max-play-out">20 s</output>
    </div>
    <button class="danger" id="stop-all">Parar tudo</button>
  </section>

  <main id="pads"></main>

  <footer>
    <p>Mudanças salvam automaticamente. Para reorganizar, edite os arquivos em <code>samples/wav/</code> e recarregue.</p>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
